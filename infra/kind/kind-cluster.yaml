# kind cluster definition for reto-devops.
# Create with:  kind create cluster --name reto-devops --config kind-cluster.yaml
#
# The control-plane node maps NodePort 30080 → host port 8080, so the frontend
# Service (NodePort 30080) is reachable at http://localhost:8080.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: reto-devops
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30080   # frontend Service nodePort
        hostPort: 8080
        protocol: TCP
