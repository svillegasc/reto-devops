apiVersion: v1
kind: Service
metadata:
  # Name is significant: Nginx proxies to http://backend:8000 via this DNS name.
  name: backend
  namespace: reto-app
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: reto-devops
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: backend
  ports:
    - name: http
      port: 8000
      targetPort: http
