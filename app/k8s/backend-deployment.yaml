apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: reto-app
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: reto-devops
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend
        app.kubernetes.io/part-of: reto-devops
    spec:
      # Pod-level security context: never run as root.
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: backend
          # Image tag is managed by the CI "GitOps Update" stage, which runs
          # `yq` to set this `image` field to the immutable commit SHA, then
          # auto-commits. ArgoCD detects the change in Git and syncs it to the
          # cluster (pull-based). Never `latest`.
          image: svillegas/reto-backend:f37d33065b8c79628f088de0a5047cad18b61ead
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          # Container-level hardening (minimum privilege).
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          # readOnlyRootFilesystem=true → give the app a writable scratch dir.
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
