apiVersion: v1
kind: Namespace
metadata:
  name: reto-app
  labels:
    app.kubernetes.io/part-of: reto-devops
    # Enforce the "restricted" Pod Security Standard at the namespace level so
    # the API server rejects any Pod that isn't hardened (defense in depth on
    # top of the per-container securityContexts).
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/warn: restricted
