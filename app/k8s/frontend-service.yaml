apiVersion: v1
kind: Service
metadata:
  name: frontend
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: reto-devops
spec:
  # NodePort so the app is reachable from the host. The kind cluster maps node
  # port 30080 → host port 8080 (see infra/kind/kind-cluster.yaml), so the UI
  # is available at http://localhost:8080.
  type: NodePort
  selector:
    app.kubernetes.io/name: frontend
  ports:
    - name: http
      port: 80
      targetPort: http
      nodePort: 30080
