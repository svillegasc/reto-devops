apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: reto-app
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: reto-devops
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend
        app.kubernetes.io/part-of: reto-devops
    spec:
      securityContext:
        runAsNonRoot: true
        # nginx-unprivileged ships as uid/gid 101.
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frontend
          # Image tag managed by the CI "GitOps Update" stage via `yq` (commit
          # SHA, never `latest`); ArgoCD syncs the change pull-based.
          image: svillegas/reto-frontend:69cad2d67734a4273a47788eaf01286e10f9e6bc
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          # Nginx needs writable temp/cache/pid dirs under a read-only rootfs.
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: nginx-cache
              mountPath: /var/cache/nginx
      volumes:
        - name: tmp
          emptyDir: {}
        - name: nginx-cache
          emptyDir: {}
