# Server block for the frontend. Listens on 8080 (unprivileged port) so the
# container can run as a non-root user. Static assets are served from disk and
# any /api/* request is reverse-proxied to the backend Service.
server {
    listen       8080;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Serve pre-compressed assets produced in the Docker build stage.
    gzip_static on;

    # index.html is the deploy entrypoint: it must always be revalidated so a
    # new release is picked up immediately (no stale HTML from browser cache).
    # `no-cache` = the browser may cache it but must revalidate via ETag every
    # time, so unchanged content still returns a cheap 304.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Static SPA-style fallback to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy: the in-cluster DNS name `backend` resolves to the backend
    # Service within the same namespace. Keeping the API same-origin avoids CORS
    # and means the browser never needs to know the backend exists.
    location /api/ {
        proxy_pass         http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 3s;
        proxy_read_timeout    10s;
    }

    # Don't leak the Nginx version in error pages / headers.
    server_tokens off;
}
