<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>reto-devops · Frontend</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      margin: 0; min-height: 100vh; display: grid; place-items: center;
      background: linear-gradient(135deg, #1e3a8a, #0f172a); color: #f8fafc;
    }
    .card {
      background: rgba(255,255,255,.06); backdrop-filter: blur(8px);
      padding: 2.5rem 3rem; border-radius: 16px; max-width: 560px;
      box-shadow: 0 20px 60px rgba(0,0,0,.35); border: 1px solid rgba(255,255,255,.1);
    }
    h1 { margin: 0 0 .5rem; font-size: 1.6rem; }
    .msg { font-size: 1.15rem; margin: 1.25rem 0; min-height: 1.4em; }
    .meta { font-size: .85rem; opacity: .8; font-family: ui-monospace, monospace; }
    .pill { display:inline-block; padding:.15rem .6rem; border-radius:999px;
            background:#22c55e22; color:#86efac; border:1px solid #22c55e55; font-size:.8rem; }
    .err { color:#fca5a5; }
  </style>
</head>
<body>
  <main class="card">
    <h1>🚀 reto-devops</h1>
    <p class="pill">Frontend (Nginx) → Backend API (FastAPI)</p>
    <p class="msg" id="msg">Cargando mensaje desde la API… Probando un cambio</p>
    <p class="meta" id="meta"></p>
  </main>

  <script>
    // The frontend never talks to the backend directly across the network;
    // Nginx reverse-proxies /api/* to the in-cluster `backend` Service.
    async function load() {
      const msgEl = document.getElementById("msg");
      const metaEl = document.getElementById("meta");
      try {
        const res = await fetch("/api/message");
        if (!res.ok) throw new Error("HTTP " + res.status);
        const data = await res.json();
        msgEl.textContent = data.message;
        metaEl.textContent = `version=${data.version} · git_sha=${data.git_sha}`;
      } catch (e) {
        msgEl.innerHTML = '<span class="err">No se pudo contactar la API: ' + e.message + '</span>';
      }
    }
    load();
  </script>
</body>
</html>
