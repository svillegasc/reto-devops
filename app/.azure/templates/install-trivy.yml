# Reusable step template: install a pinned Trivy version onto the agent.
# Pinning the version keeps scan results deterministic across runs.
steps:
  - script: |
      set -euo pipefail
      curl -sSfL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" \
        | sudo tar -xz -C /usr/local/bin trivy
      trivy --version
    displayName: 'Install Trivy v$(TRIVY_VERSION)'
